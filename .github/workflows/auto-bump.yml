name: auto-bump

# Self-bump for the org-profile repo. Tags every push to main
# with content changes so consumers can pin a revision to the
# org's public-facing README/profile content.
#
# Mirrors pleme-io/actions/.github/workflows/auto-bump.yml.

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      bump-type:
        default: patch

permissions:
  contents: write

jobs:
  bump:
    runs-on: ubuntu-latest
    if: github.actor != 'github-actions[bot]'
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }

      - name: Compute next tag from content changes
        id: next
        shell: bash
        run: |
          last=$(git tag -l 'v0.*' --sort=-v:refname | head -1 || true)
          if [ -z "$last" ]; then
            echo "tag=v0.1.0" >> "$GITHUB_OUTPUT"
            echo "skip=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if git diff --quiet "$last" HEAD -- 'profile/' '.github/'; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          bump="${{ inputs.bump-type || 'patch' }}"
          IFS='.' read -r maj min pat <<<"${last#v}"
          case "$bump" in
            major) maj=$((maj+1)); min=0; pat=0 ;;
            minor) min=$((min+1)); pat=0 ;;
            patch|*) pat=$((pat+1)) ;;
          esac
          echo "tag=v${maj}.${min}.${pat}" >> "$GITHUB_OUTPUT"
          echo "skip=false" >> "$GITHUB_OUTPUT"

      - name: Tag + push
        if: steps.next.outputs.skip == 'false'
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ steps.next.outputs.tag }}" -m "release: pleme-io/.github ${{ steps.next.outputs.tag }}"
          git push origin "${{ steps.next.outputs.tag }}"
